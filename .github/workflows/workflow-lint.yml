name: Workflow Lint

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
