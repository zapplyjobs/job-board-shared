# Auto Bump Submodule — fires only after CI Gate succeeds on job-board-shared main.
# Dispatches bump-submodule.yml in jobs-aggregator-private with the exact tested SHA.
#
# Prerequisite: GH_PAT secret must be in job-board-shared repo settings.
# Why: bumping on raw push can propagate a bad shared commit before CI finishes.

name: Auto Bump Submodule

on:
  workflow_run:
    workflows: ["CI Gate"]
    types:
      - completed

jobs:
  auto-bump:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Record tested SHA
        id: sha
        run: |
          echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          echo "Tested job-board-shared SHA: ${{ github.event.workflow_run.head_sha }}"

      - name: Dispatch bump-submodule
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run bump-submodule.yml \
            --repo zapplyjobs/jobs-aggregator-private \
            --field submodule_name=shared \
            --field target_sha="${{ steps.sha.outputs.sha }}"
          echo "Dispatched bump-submodule.yml (shared) with tested SHA ${{ steps.sha.outputs.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Auto-bump dispatch failed. Manual bump may be needed."