# Auto Bump Submodule — fires on push to job-board-shared main.
# Dispatches bump-submodule.yml in jobs-aggregator-private with the new SHA.
#
# Prerequisite: GH_PAT secret must be in job-board-shared repo settings.
# Race safety: bump-submodule.yml has concurrency group (cancel-in-progress: false).

name: Auto Bump Submodule

on:
  push:
    branches: [main]

jobs:
  auto-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Get pushed SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          SHA=$(gh api repos/zapplyjobs/job-board-shared/commits?per_page=1 --jq '.[0].sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Latest job-board-shared SHA: $SHA"

      - name: Dispatch bump-submodule
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run bump-submodule.yml \
            --repo zapplyjobs/jobs-aggregator-private \
            --field submodule_name=shared \
            --field target_sha="${{ steps.sha.outputs.sha }}"
          echo "Dispatched bump-submodule.yml (shared) with SHA ${{ steps.sha.outputs.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Auto-bump dispatch failed. Manual bump may be needed."