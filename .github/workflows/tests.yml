name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tag-engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node lib/__tests__/tag-engine.test.js

  validate-company-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node lib/aggregator/fetchers/validate-company-list.js

  enrich-jobs-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node lib/__tests__/enrich-jobs.test.js

  validate-lca-aliases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node tools/validate-lca-aliases.js --remote
