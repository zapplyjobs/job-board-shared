name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tag-engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: node lib/__tests__/tag-engine.test.js

  validate-company-list:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: node lib/aggregator/fetchers/validate-company-list.js

  enrich-jobs-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install
      - run: node lib/__tests__/enrich-jobs.test.js

  validate-lca-aliases:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: node tools/validate-lca-aliases.js --remote
        env:
          GH_TOKEN: ${{ github.token }}

  pipeline-checks-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: node lib/__tests__/pipeline-checks.test.js
