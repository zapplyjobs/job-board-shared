name: Update Dependency

on:
  workflow_dispatch:
    inputs:
      package_spec:
        description: 'Package spec (e.g., @aws-sdk/client-s3@^3.700.0 or lodash@4.17.21)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (do not push changes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: update-dep
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install current dependencies
        run: npm ci

      - name: Update package
        run: |
          echo "Installing ${{ inputs.package_spec }}"
          npm install "${{ inputs.package_spec }}"

      - name: Verify lockfile consistency
        run: |
          npm ci --ignore-scripts
          echo "package-lock.json is consistent with package.json"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — package already at requested version"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "=== package.json diff ==="
            git diff package.json
            echo ""
            echo "=== New dependency tree ==="
            npm ls --depth=0 2>/dev/null || true
          fi

      - name: Push changes
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run == false
        run: |
          git config user.name "z-apply"
          git config user.email "admin@zapply.jobs"
          git add package.json package-lock.json
          git commit -m "chore: update ${{ inputs.package_spec }}"
          git push

      - name: Summary
        if: always()
        run: |
          echo "### Dependency Update" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: \`${{ inputs.package_spec }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Changed: ${{ steps.changes.outputs.changed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry run: ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.changes.outputs.changed }}" = "true" ] && [ "${{ inputs.dry_run }}" = "false" ]; then
            echo "- **Pushed to main**" >> "$GITHUB_STEP_SUMMARY"
          fi
