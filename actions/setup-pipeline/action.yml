name: 'Setup Pipeline Environment'
description: 'Setup Node.js and install dependencies (run AFTER actions/checkout)'

inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '22'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: |
        npm install axios
        if [ -f ".github/scripts/shared/package.json" ]; then
          cd .github/scripts/shared && npm install && cd "$GITHUB_WORKSPACE"
        fi
        if [ -d ".github/scripts/consumer" ] && [ -f ".github/scripts/consumer/package.json" ]; then
          cd .github/scripts/consumer && npm install && cd "$GITHUB_WORKSPACE"
        fi
