name: 'Count Drop Alert'
description: 'Detect and alert on significant job count drops via Discord'

inputs:
  repo-name:
    description: 'Repository name for alert identification'
    required: false
    default: ''
  count-file-path:
    description: 'Path to current_jobs.json'
    required: false
    default: '.github/data/current_jobs.json'
  last-count-path:
    description: 'Path to last_count.json'
    required: false
    default: '.github/data/last_count.json'
  discord-token:
    description: 'Discord bot token'
    required: false
    default: ''
  discord-channel-id:
    description: 'Discord channel ID for alerts'
    required: false
    default: ''
  drop-threshold:
    description: 'Drop percentage threshold (0.5 = 50%)'
    required: false
    default: '0.5'

runs:
  using: 'composite'
  steps:
    - name: Count-drop alert
      shell: bash
      env:
        DISCORD_TEAM_TOKEN: ${{ inputs.discord-token }}
        DISCORD_ALERT_CHANNEL_ID: ${{ inputs.discord-channel-id }}
        ALERT_REPO_NAME: ${{ inputs.repo-name || github.event.repository.name }}
      run: |
        mkdir -p .github/data
        export CURR_COUNT=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('${{ inputs.count-file-path }}','utf8'));console.log(Array.isArray(d)?d.length:0)}catch(e){console.log(0)}")
        node -e "
          const fs = require('fs');
          const https = require('https');
          const curr = parseInt(process.env.CURR_COUNT || '0', 10);
          const lastPath = '${{ inputs.last-count-path }}';
          const threshold = parseFloat('${{ inputs.drop-threshold }}');
          const prev = fs.existsSync(lastPath) ? JSON.parse(fs.readFileSync(lastPath)).count : null;
          fs.writeFileSync(lastPath, JSON.stringify({ count: curr, timestamp: new Date().toISOString() }));
          const isZero = curr === 0;
          const isDrop = prev !== null && curr < prev * threshold;
          if (!isZero && !isDrop) { console.log('Count OK: ' + curr + (prev !== null ? ' (prev: ' + prev + ')' : '')); process.exit(0); }
          const reason = isZero ? 'Job count hit 0' : 'Job count dropped >' + Math.round((1 - curr/prev)*100) + '% (' + prev + ' -> ' + curr + ')';
          console.warn('ALERT: ' + reason);
          if (!process.env.DISCORD_TEAM_TOKEN || !process.env.DISCORD_ALERT_CHANNEL_ID) { console.error('Discord secrets not set — alert suppressed'); process.exit(0); }
          const body = JSON.stringify({ embeds: [{ title: 'Consumer Count Drop', color: 0xe74c3c, description: '**' + process.env.ALERT_REPO_NAME + '**: ' + reason, footer: { text: new Date().toISOString() } }] });
          const req = https.request({ hostname: 'discord.com', path: '/api/v10/channels/' + process.env.DISCORD_ALERT_CHANNEL_ID + '/messages', method: 'POST', headers: { 'Authorization': 'Bot ' + process.env.DISCORD_TEAM_TOKEN, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) } }, res => { console.log('Discord response: ' + res.statusCode); });
          req.on('error', e => console.error('Discord request failed: ' + e.message));
          req.setTimeout(5000, () => { req.destroy(); });
          req.write(body); req.end();
        "
