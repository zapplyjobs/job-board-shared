name: 'Commit and Push with Retry'
description: 'Check for changes, commit with message, and push with exponential backoff retry'

inputs:
  commit-message:
    description: 'Commit message (pre-computed — do NOT use shell substitutions here)'
    required: true
  files:
    description: 'Space-separated list of files/directories to git add (no spaces in individual paths)'
    required: false
    default: '.'
  branch:
    description: 'Branch to push to'
    required: false
    default: ''
  max-attempts:
    description: 'Maximum push attempts'
    required: false
    default: '5'
  initial-delay:
    description: 'Initial retry delay in seconds'
    required: false
    default: '5'

outputs:
  changed:
    description: 'Whether changes were detected and committed'
    value: ${{ steps.verify.outputs.changed }}

runs:
  using: 'composite'
  steps:
    - name: Check for changes
      id: verify
      shell: bash
      run: |
        echo "Git status:"
        git status --porcelain
        echo ""
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "Found changes in files"
        else
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        fi

    - name: Commit and Push
      if: steps.verify.outputs.changed == 'true'
      shell: bash
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        max_attempts=${{ inputs.max-attempts }}
        delay=${{ inputs.initial-delay }}
        branch=${{ inputs.branch || github.ref_name }}

        for attempt in $(seq 1 $max_attempts); do
          echo "Attempt $attempt of $max_attempts"

          git pull origin "$branch" --no-edit || {
            echo "Pull had conflicts, resetting..."
            git reset --hard HEAD
          }

          git add ${{ inputs.files }} || true

          if ! git commit -m "${{ inputs.commit-message }}"; then
            echo "Commit failed, may already be committed"
          fi

          if git push origin "$branch"; then
            echo "Successfully pushed changes!"
            exit 0
          else
            echo "Push failed — retrying in ${delay}s..."
            git reset --soft HEAD~1
            sleep $delay
            delay=$((delay * 2))
          fi
        done

        echo "Failed to push after $max_attempts attempts"
        exit 1
